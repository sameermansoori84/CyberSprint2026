<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CyberSprint 2026 – Teacher Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; padding: 10px; }
    h1 { font-size: 22px; }
    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
    button { background: #28a745; color: #fff; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin: 5px 5px 10px 0; }
    button:hover { background: #218838; }
    .day-btn { background: #6c757d; }
    .day-btn.active { background: #007bff; }
    #reader { width: 100%; max-width: 400px; margin: 10px 0; }
    #result { margin-top: 20px; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    #studentDetails { margin-top: 15px; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
  </style>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="/js/teacher.js" defer></script>
</head>
<body>
  <h1>Attendance Panel</h1>

  <label>CyberSprint 2026</label>
    
  <div>
    <button class="day-btn active" data-day="Day 1">Day 1 <br>(12 March 2026)</button>
    <button class="day-btn" data-day="Day 2">Day 2 <br>(13 March 2026)</button>
    <button class="day-btn" data-day="Day 3">Day 3 <br>(14 March 2026)</button>
  </div>

  
  <div id="reader"></div>

  <h3>Type CS-ID</h3>
  <input type="text" id="manualCsId" placeholder="e.g., CS2026-4213" />
  <button id="manualPreviewBtn">Preview Student</button>

  <div id="studentDetails" style="display:none;"></div>

  <button id="markBtn" disabled>Mark Present</button>

  <div id="result"></div>
</body>
</html>
