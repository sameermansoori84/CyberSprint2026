<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSprint 2026 – Registration</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 50px auto; padding: 20px; }
    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input, select { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
    .row { display: flex; gap: 20px; }
    .row div { flex: 1; }
    #message { padding: 15px; margin: 20px 0; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    button { background: #007bff; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
  <script src="/js/register.js" defer></script>
</head>
<body>
  <h1>CyberSprint 2026 – Registration</h1>

  <form id="regForm">
    <div class="row">
      <div>
        <label>First Name:</label>
        <input type="text" name="firstName" required />
      </div>
      <div>
        <label>Last Name:</label>
        <input type="text" name="lastName" required />
      </div>
    </div>

    <label>Email ID:</label>
    <input type="email" name="email" required />

    <label>WhatsApp Number:</label>
    <input type="tel" name="whatsappNumber" required />

    <label>University:</label>
    <select name="university" id="university" required>
      <option value="">Select University</option>
      <option value="Bhagwan Mahavir University">Bhagwan Mahavir University</option>
      <option value="Other University">Other University</option>
    </select>

    <label id="collegeLabel">College Name:</label>
    <select id="collegeDropdown" style="display: none;">
      <option value="">Select College</option>
    </select>
    <input type="text" id="collegeTextbox" placeholder="Enter your college/university name" style="display: none;" />
    <input type="hidden" id="collegeHidden" name="collegeName" />

    <label>Course:</label>
    <select name="course" id="course" required>
      <option value="">Select Course</option>
      <option value="Bachelors">Bachelors</option>
      <option value="Masters">Masters</option>
    </select>

    <label>Year of Study:</label>
    <select name="yearOfStudy" id="yearOfStudy" required>
      <option value="">Select Year</option>
    </select>

    <label>Emergency Contact Person Name:</label>
    <input type="text" name="emergencyContactName" required />

    <label>Emergency Contact Person Number:</label>
    <input type="tel" name="emergencyContactNumber" required />

    <label>Payment Reference (Screenshot URL / description):</label>
    <input type="text" name="paymentReference" />

    <label>Event:</label>
    <input type="text" name="event" value="CyberSprint 2026" />

    <button type="submit">Register for CyberSprint 2026</button>
  </form>

  <div id="message"></div>
</body>
</html>
